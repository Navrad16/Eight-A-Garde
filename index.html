<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eight Garden 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            /* Warna Desain Asli untuk Chart */
            --green-asli: #16a34a;
            --teal-asli: #0d9488;
            /* Warna UI Mint Transparan */
            --glass: rgba(185, 250, 214, 0.65);
            --dark-green: #052e16;
            --radius: 25px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: url('https://i.pinimg.com/736x/f6/d1/3f/f6d13f28dc53835a97934ba82eb5b03a.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--dark-green);
            padding: 30px 20px;
            min-height: 100vh;
        }

        .wrapper { max-width: 1100px; margin: 0 auto; }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .apple-icon { height: 70px; width: auto; }

        /* LAYOUT GRID */
        .grid-main {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* SENSOR AREA */
        .sensor-display {
            flex-grow: 1;
            margin-bottom: 15px;
        }
        .sensor-val { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        .sensor-unit { font-size: 1.2rem; opacity: 0.6; }

        /* CHART AREA (DI BAGIAN BAWAH KARTU) */
        .chart-box {
            width: 100%;
            height: 130px;
            margin-top: auto;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 10px;
        }

        /* INPUTS */
        input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.5);
            font-weight: 700; color: var(--dark-green);
        }
        .btn {
            background: var(--green-asli); color: white; border: none;
            padding: 14px; border-radius: 15px; font-weight: 800;
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn:hover { background: var(--dark-green); transform: translateY(-2px); }

        /* MODE & ACTUATOR */
        .full-width { grid-column: span 2; }
        .mode-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-mode { padding: 12px 30px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; }
        .btn-mode.active { background: var(--dark-green); color: white; }
        .btn-mode.inactive { background: rgba(255,255,255,0.4); color: var(--dark-green); }

        .actuator-card { text-align: center; }
        .actuator-icon { font-size: 4rem; opacity: 0.2; transition: 0.4s; }
        .actuator-icon.on { opacity: 1; color: #f1c40f; text-shadow: 0 0 20px rgba(241,196,15,0.4); }

        .terminal-card { background: #052e16; color: #4ade80; }
        .log-panel { height: 150px; overflow-y: auto; font-family: 'Space Mono', monospace; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Eight <img src="https://img.sanishtech.com/u/421b447f1026ccf6684e267b26fcc9a3.png" class="apple-icon"> Garden</h1>
    </div>

    <div class="grid-main">
        <div class="card">
            <div class="card-title"><i class="fas fa-cloud"></i> Firebase Configuration</div>
            <input type="password" id="fb-apiKey" placeholder="API Key">
            <input type="text" id="fb-dbUrl" placeholder="Database URL">
            <input type="text" id="fb-path" value="garden/sensor1">
            <button class="btn" id="btn-connect-fb">Connect Firebase</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fab fa-bluetooth"></i> Bluetooth Connection</div>
            <p style="font-size: 0.8rem; margin-bottom: 20px; opacity: 0.8;">Klik untuk menghubungkan perangkat Micro:bit.</p>
            <button class="btn" id="btn-connect-ble">Connect BLE</button>
            <button class="btn" id="btn-disconnect-ble" style="background:#555; margin-top:10px" disabled>Disconnect</button>
        </div>

        <div class="card full-width mode-row">
            <div>
                <p style="font-weight: 900;">SYSTEM OPERATION MODE</p>
                <p style="font-size: 0.7rem; opacity: 0.7;">Auto: Sensor Based | Manual: Switch Based</p>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-mode active" id="btn-mode-auto">Automatic</button>
                <button class="btn-mode inactive" id="btn-mode-manual">Manual</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-ruler-vertical"></i> Ultrasonic 1</div>
            <div class="sensor-display">
                <div class="sensor-val" id="val-jarak">-- <span class="sensor-unit">cm</span></div>
            </div>
            <div class="chart-box">
                <canvas id="chart-jarak"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-tint"></i> Ultrasonic 2 (Ember)</div>
            <div class="sensor-display">
