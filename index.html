<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eight Garden 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@700;900&family=Fredoka:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --btn-green: #1e7e4d;
            --text-color: #ffffff;
            --radius: 25px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            /* Update Background Link Pinterest */
            background: url('https://i.pinimg.com/736x/95/d9/18/95d9184b27f13c4617e9b04d03ce38b0.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        /* Overlay gelap sedikit agar teks terbaca */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        .wrapper { max-width: 850px; margin: 0 auto; }

        /* ===== HEADER & LOGO TEKS ===== */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3.5rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }
        /* Logo Teks StrawBerry (Referensi Link ke-2) */
        .logo-text {
            font-family: 'Pacifico', cursive;
            font-size: 0.8em;
            color: #ff4d4d; /* Merah Strawberry */
            background: white;
            padding: 0 15px;
            border-radius: 50px;
            transform: rotate(-5deg);
            box-shadow: 4px 4px 0px #c0392b;
            border: 2px solid #fff;
        }

        .status-wrap { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px; }
        .badge {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid var(--glass-border);
            color: white;
        }
        .badge.online { background: #ffffff; color: #1b5e20; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            border: 2px solid var(--glass-border);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .card-title { font-size: 0.85rem; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        label { display: block; font-size: 0.65rem; font-weight: 900; margin-bottom: 4px; }
        input {
            width: 100%; padding: 10px;
            border-radius: 12px; border: none;
            background: rgba(255,255,255,0.3);
            margin-bottom: 8px; outline: none;
            color: white; font-weight: 700;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }

        .btn {
            background: #1e7e4d;
            color: white; border: none;
            padding: 12px; border-radius: 15px;
            font-weight: 800; cursor: pointer;
            width: 100%; transition: 0.3s;
        }
        .btn:hover { background: #145a32; transform: translateY(-2px); }

        /* MODE SWITCH */
        .mode-section {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bg); padding: 15px 25px;
            border-radius: var(--radius); margin-bottom: 15px;
            border: 2px solid var(--glass-border); backdrop-filter: blur(15px);
        }
        .mode-btns { display: flex; gap: 10px; }
        .mode-btn {
            padding: 10px 20px; border-radius: 15px; border: none;
            font-weight: 800; cursor: pointer; font-size: 0.8rem;
        }
        .mode-btn.active { background: #1e7e4d; color: white; }
        .mode-btn.inactive { background: rgba(255,255,255,0.8); color: #1e7e4d; }

        /* SENSOR */
        .sensor-val { font-size: 2.5rem; font-weight: 900; margin: 5px 0; }
        .sensor-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .sensor-bar-fill { height: 100%; background: #ffffff; transition: 0.5s; width: 0%; }

        /* TERMINAL */
        .terminal {
            background: rgba(5, 26, 7, 0.9);
            border-radius: var(--radius);
            padding: 20px; color: #7cfc00;
            font-family: 'Space Mono', monospace;
            margin-top: 20px; border: 1px solid var(--glass-border);
        }
        .terminal-header { display: flex; gap: 8px; margin-bottom: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .log-panel { height: 150px; overflow-y: auto; font-size: 12px; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Eight <span class="logo-text">StrawBerry</span> Garden</h1>
    </div>

    <div class="status-wrap">
        <div class="badge" id="status-bt">BT Offline</div>
        <div class="badge" id="status-fb">DB Offline</div>
    </div>

    <div class="grid-2">
        <div class="card">
            <div class="card-title"><i class="fas fa-cloud"></i> FireBase Cloud Sync</div>
            <label>API KEY</label>
            <input type="password" id="fb-apiKey" placeholder="Masukkan API Key...">
            <label>DATABASE URL</label>
            <input type="text" id="fb-dbUrl" placeholder="https://your-db.firebaseio.com">
            <label>NODE PATH</label>
            <input type="text" id="fb-path" placeholder="garden/sensor1">
            <button class="btn" id="btn-connect-fb">Connect FireBase</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-cog"></i> Micro:Bit Bluetooth</div>
            <p style="font-size: 11px; margin-bottom: 15px; opacity: 0.9;">Koneksikan ke Micro:bit untuk kontrol real-time.</p>
            <button class="btn" id="btn-connect-ble" style="margin-bottom: 10px;">Connect Micro:Bit</button>
            <button class="btn" id="btn-disconnect-ble" style="background:#555" disabled>Disconnect</button>
        </div>
    </div>

    <div class="mode-section">
        <div>
            <h3 style="font-size: 1rem;">System Mode</h3>
            <p id="mode-desc" style="font-size: 0.7rem; opacity: 0.8;">Automatic: controlled by sensor</p>
        </div>
        <div class="mode-btns">
            <button class="mode-btn active" id="btn-mode-auto"><i class="fas fa-robot"></i> Automatic</button>
            <button class="mode-btn inactive" id="btn-mode-manual"><i class="fas fa-hand-paper"></i> Manual</button>
        </div>
    </div>

    <div class="grid-2">
        <div class="card">
            <div class="card-title"><i class="fas fa-tint"></i> Ultrasonic 1 - P0/P1</div>
            <div class="sensor-val" id="val-jarak">--<span style="font-size: 1rem;">cm</span></div>
            <div class="sensor-bar"><div class="sensor-bar-fill" id="bar-jarak"></div></div>
            <canvas id="chart-jarak" style="max-height: 80px;"></canvas>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-water"></i> Ultrasonic 2 - Ember</div>
            <div class="sensor-val" id="val-jarak-manual">--<span style="font-size: 1rem;">cm</span></div>
            <div class="sensor-bar"><div class="sensor-bar-fill" id="bar-jarak-manual"></div></div>
            <canvas id="chart-jarak-manual" style="max-height: 80px;"></canvas>
        </div>
    </div>

    <div class="card" style="text-align: center; padding: 40px;">
        <div class="card-title" style="justify-content: center;"><i class="fas fa-bolt"></i> Aktuator</div>
        <div id="icon-relay" style="font-size: 4rem; margin: 10px 0; opacity: 0.3;">⚡</div>
        <div id="lbl-relay" style="font-size: 1.5rem; font-weight: 900;">PUMP OFF</div>
        
        <div id="manual-relay-wrap" style="display:none; margin-top: 20px; justify-content: center; gap: 10px; align-items: center;">
            <span style="font-size: 0.8rem; font-weight: 800;">MANUAL SWITCH:</span>
            <input type="checkbox" id="sw-relay" style="width: 40px; height: 20px; cursor: pointer;" onchange="window.toggleRelay(this.checked)">
        </div>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="dot" style="background:#ff5f56"></div>
            <div class="dot" style="background:#ffbd2e"></div>
            <div class="dot" style="background:#27c93f"></div>
            <span style="font-size: 0.7rem; margin-left: 10px; opacity: 0
