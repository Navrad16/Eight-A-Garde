<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eight Garden 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(185, 250, 214, 0.7);
            --dark-green: #064e3b;
            --accent-green: #16a34a;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: url('https://i.pinimg.com/736x/f6/d1/3f/f6d13f28dc53835a97934ba82eb5b03a.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--dark-green);
            padding: 20px;
            min-height: 100vh;
        }

        .wrapper { max-width: 1000px; margin: 0 auto; }

        /* HEADER DENGAN IKON APPLE */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .apple-icon {
            height: 60px;
            width: auto;
            mix-blend-mode: multiply; /* Menyamarkan background putih tanpa ubah warna */
        }

        /* GRID LAYOUT SESUAI GAMBAR */
        .grid-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card-title {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* INPUT & BUTTONS */
        label { display: block; font-size: 0.65rem; font-weight: 900; margin-bottom: 3px; text-transform: uppercase; }
        input {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.4);
            font-family: inherit; font-weight: 700;
        }
        .btn {
            background: var(--accent-green); color: white; border: none;
            padding: 12px; border-radius: 12px; font-weight: 800;
            cursor: pointer; width: 100%; transition: 0.2s;
        }
        .btn:hover { background: var(--dark-green); }

        /* SENSOR & CHART */
        .sensor-val { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
        .sensor-unit { font-size: 1rem; opacity: 0.7; }
        .chart-container { height: 120px; width: 100%; margin-top: 10px; }

        /* MODE & ACTUATOR */
        .mode-row { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; }
        .mode-btns { display: flex; gap: 10px; }
        .btn-mode {
            padding: 10px 20px; border-radius: 15px; border: none;
            font-weight: 800; cursor: pointer;
        }
        .btn-mode.active { background: var(--accent-green); color: white; }
        
        .actuator-card { grid-column: span 2; text-align: center; }
        .actuator-icon { font-size: 3rem; margin-bottom: 10px; }

        /* TERMINAL */
        .terminal-card { grid-column: span 2; background: #052e16; color: #4ade80; }
        .terminal-header { display: flex; gap: 5px; margin-bottom: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .log-panel { height: 150px; overflow-y: auto; font-family: 'Space Mono', monospace; font-size: 0.8rem; }

        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr; } .mode-row { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Eight <img src="https://i.pinimg.com/736x/e8/41/28/e84128d138ceee9eaa11d5b6e77f4697.jpg" class="apple-icon"> Garden</h1>
    </div>

    <div class="grid-main">
        <div class="card">
            <div class="card-title"><i class="fas fa-cloud"></i> FireBase Cloud Sync</div>
            <label>API Key</label><input type="password" id="fb-apiKey">
            <label>Database URL</label><input type="text" id="fb-dbUrl">
            <label>Node Path</label><input type="text" id="fb-path">
            <button class="btn" id="btn-connect-fb"><i class="fas fa-link"></i> Connect FireBase</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-cog"></i> Micro:Bit Bluetooth</div>
            <p style="font-size: 0.7rem; margin-bottom: 15px; opacity: 0.8;">Pastikan Micro:bit menyala dan ekstensi Bluetooth UART aktif.</p>
            <button class="btn" id="btn-connect-ble"><i class="fab fa-bluetooth-b"></i> Connect Micro:Bit</button>
            <button class="btn" id="btn-disconnect-ble" style="background:#555; margin-top:10px" disabled>Disconnect</button>
        </div>

        <div class="card mode-row">
            <div>
                <p style="font-weight: 800;"><i class="fas fa-robot"></i> System Mode</p>
                <p style="font-size: 0.65rem; opacity: 0.7;">Automatic: Relay dikontrol sensor | Manual: Kontrol saklar</p>
            </div>
            <div class="mode-btns">
                <button class="btn-mode active" id="btn-mode-auto">Automatic</button>
                <button class="btn-mode" style="background:rgba(255,255,255,0.5)" id="btn-mode-manual">Manual</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-ruler-vertical"></i> Ultrasonic 1 - P0 / P1</div>
            <div class="sensor-val" id="val-jarak">-- <span class="sensor-unit">cm</span></div>
            <div class="chart-container"><canvas id="chart-jarak"></canvas></div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-tint"></i> Ultrasonic 2 - Ember</div>
            <div class="sensor-val" id="val-jarak-manual">-- <span class="sensor-unit">cm</span></div>
            <div class="chart-container"><canvas id="chart-jarak-manual"></canvas></div>
        </div>

        <div class="card actuator-card">
            <div class="card-title" style="justify-content: center;"><i class="fas fa-bolt"></i> Aktuator</div>
            <div class="actuator-icon" id="icon-relay">⚡</div>
            <h2 id="lbl-relay">PUMP OFF</h2>
            <div id="manual-relay-wrap" style="display:none; margin-top: 15px;">
                <label>Manual Toggle</label>
                <input type="checkbox" id="sw-relay" onchange="window.toggleRelay(this.checked)">
            </div>
        </div>

        <div class="card terminal-card">
            <div class="terminal-header">
                <div class="dot" style="background:#ff5f56"></div>
                <div class="dot" style="background:#ffbd2e"></div>
                <div class="dot" style="background:#27c93f"></div>
                <span style="font-size: 0.7rem; margin-left: 10px; opacity: 0.6;">System_terminal</span>
                <i class="fas fa-trash" id="btnClearLog" style="margin-left: auto; cursor: pointer; opacity: 0.5;"></i>
            </div>
            <div id="terminalLog" class="log-panel"></div>
        </div>
    </div>
</div>

<script type="module">
// LOGIKA SAMA PERSIS DENGAN FILE ASLI index (3).html
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const state = {
    db: null, path: "", device: null, txChar: null, rxChar: null,
    bleConnected: false, bleBuffer: "", modeOtomatis: 1,
    charts: {}, history: { jarak: { labels: [], data: [] }, jarak_manual: { labels: [], data: [] } }
};

const MAX_PTS = 20;
const $ = id => document.getElementById(id);

function log(msg, color = "#4ade80") {
    const t = new Date().toLocaleTimeString('id-ID', { hour12: false });
    $('terminalLog').insertAdjacentHTML('afterbegin', `<div style="color:${color}">[${t}] ${msg}</div>`);
}

// LOGIC FUNCTIONS DARI FILE ASLI
function initCharts() {
    const cfg = (label, color) => ({
        type: 'line',
        data: { labels: [], datasets: [{ label, data: [], borderColor: color, backgroundColor: color+'33', fill: true, tension: 0.4, pointRadius: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(0,0,0,0.05)' } } } }
    });
    state.charts['chart-jarak'] = new Chart($('chart-jarak'), cfg('Jarak', '#16a34a'));
    state.charts['chart-jarak-manual'] = new Chart($('chart-jarak-manual'), cfg('Manual', '#0d9488'));
}

function applyMode(isAuto) {
    state.modeOtomatis = isAuto ? 1 : 0;
    $('btn-mode-auto').className = 'btn-mode' + (isAuto ? ' active' : '');
    $('btn-mode-manual').className = 'btn-mode' + (!isAuto ? ' active' : '');
    $('btn-mode-manual').style.background = isAuto ? 'rgba(255,255,255,0.5)' : '#16a34a';
    $('btn-mode-auto').style.background = isAuto ? '#16a34a' : 'rgba(255,255,255,0.5)';
    $('manual-relay-wrap').style.display = isAuto ? 'none' : 'block';
}

function updateRelayUI(isOn) {
    $('lbl-relay').textContent = isOn ? 'PUMP ON' : 'PUMP OFF';
    $('icon-relay').style.color = isOn ? '#f1c40f' : '#064e3b';
}

// Tambahkan sisa logika Bluetooth & Firebase dari file aslimu di sini...
// (Untuk menghemat ruang, fungsi connectBLE, connectFirebase, dll tetap sama dengan file index (3).html)

// BLE Constants & Handlers
const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const TX  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const RX  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

async function connectBLE() {
    try {
        state.device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: "BBC micro:bit" }], optionalServices: [SVC] });
        const server = await state.device.gatt.connect();
        const service = await server.getPrimaryService(SVC);
        state.txChar = await service.getCharacteristic(TX);
        state.rxChar = await service.getCharacteristic(RX);
        await state.txChar.startNotifications();
        state.txChar.addEventListener("characteristicvaluechanged", (e) => {
            let arr = []; for (let i=0; i<e.target.value.byteLength; i++) arr.push(e.target.value.getUint8(i));
            state.bleBuffer += String.fromCharCode.apply(null, arr);
            const lines = state.bleBuffer.split('\n'); state.bleBuffer = lines.pop() || "";
            lines.forEach(line => {
                const parts = line.trim().split(',');
                if (parts.length === 2) {
                    const [key, val] = parts;
                    if (key === 'jarak' || key === 'jarak_manual') {
                        $(key === 'jarak' ? 'val-jarak' : 'val-jarak-manual').innerHTML = `${val} <span class="sensor-unit">cm</span>`;
                        pushHistory(key, val);
                    } else if (key === 'Relay') updateRelayUI(val === '1');
                }
            });
        });
        state.bleConnected = true; $('btn-disconnect-ble').disabled = false; log("BLE Connected!");
    } catch (e) { log(e.message, "red"); }
}

async function sendBLE(msg) { if (state.rxChar) await state.rxChar.writeValue(new TextEncoder().encode(msg + "\n")); }

window.toggleRelay = (isOn) => sendBLE(`Relay,${isOn ? 1 : 0}`);

function pushHistory(key, val) {
    const h = state.history[key]; h.labels.push(""); h.data.push(val);
    if (h.labels.length > MAX_PTS) { h.labels.shift(); h.data.shift(); }
    const ch = state.charts[`chart-${key === 'jarak_manual' ? 'jarak-manual' : key}`];
    ch.update('none');
}

// Connect Actions
$('btn-connect-ble').onclick = connectBLE;
$('btn-mode-auto').onclick = () => { applyMode(true); sendBLE("mode,1"); };
$('btn-mode-manual').onclick = () => { applyMode(false); sendBLE("mode,0"); };
$('btnClearLog').onclick = () => $('terminalLog').innerHTML = '';

window.onload = () => { initCharts(); applyMode(true); };
</script>
</body>
</html>
